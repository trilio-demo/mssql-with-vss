# =============================================================================
# ghcr-secret.example.yaml  —  CDI pull secret for the private win2k25 golden image
# =============================================================================
# Creates the `ghcr-cdi` secret CDI uses to pull the golden containerDisk from
# the private ghcr package (DataVolume / DataImportCron `source.registry`).
#
# The PAT is supplied via an ENV VAR, never hardcoded here — so this template is
# safe to commit. Do NOT commit a filled-in copy. Fill + apply with envsubst:
#
#   export GHCR_USER=<your-github-username>     # e.g. vebutton  (NOT an email)
#   export GHCR_READ_PAT=ghp_xxxxxxxx           # classic PAT, scope: read:packages
#   envsubst < docs/ghcr-secret.example.yaml | oc apply -n <namespace> -f -
#
# Apply it in every namespace that pulls the image (and in
# openshift-virtualization-os-images too, if you use the DataImportCron — §2b).
#
# (No envsubst handy? Equivalent one-liner, no file:
#   oc create secret generic ghcr-cdi -n <namespace> \
#     --from-literal=accessKeyId="$GHCR_USER" --from-literal=secretKey="$GHCR_READ_PAT" )
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-cdi
type: Opaque
stringData:
  accessKeyId: ${GHCR_USER}      # GitHub username — CDI rejects an email here
  secretKey: ${GHCR_READ_PAT}    # the READ PAT (read:packages)
