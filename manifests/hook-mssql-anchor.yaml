# Sub-track 1 Phase 1 — TVK Hook: COPY_ONLY .bak anchor via QGA guest-exec.
#
# pre  : COPY_ONLY anchor backup of demo_db to D:\SQLBackup\tvk-prehook-anchor.bak,
#        then RESTORE HEADERONLY to verify it and log FirstLSN/LastLSN/IsCopyOnly.
#        (Log-chain anchor rides inside the snapshot — Exp-4 Path A, automated.)
# post : freeze-safe ack only (guest-ping + fsfreeze-status).
#
# ⚠️ TVK hook ordering (proven empirically 2026-07-04, backups #3–#6 on this lab):
#   pre-hook → QGA fsfreeze → CSI snapshot → post-hook → thaw.
#   The THAW WAITS FOR THE POST-HOOK, and while frozen QGA disables guest-exec
#   ("Command guest-exec has been disabled") — so a post-hook can NEVER guest-exec:
#   it would deadlock until its own timeout. Worse, holding the freeze past ~60s
#   trips the SQL Server VSS writer freeze timeout (thaw event 3198 at exactly
#   +60s, no 7×18264 completion events). Post-hook must be fast + whitelisted
#   QGA calls only (guest-ping, guest-fsfreeze-status are allowed while frozen).
#
# ⚠️ TVK pins the Hook's resourceVersion into BackupPlan.spec.hookConfig at admission.
#   CORRECTED 2026-07-16 (repro/hook-sequencing/, marker-based test): backups
#   EXECUTE the live Hook content even with a stale pin — the defect is that the
#   BackupPlan pin + Backup.status.hookStatus keep reporting the old RV (audit
#   trail claims a hook version that didn't run). Re-pin after edits anyway to
#   keep the recorded RV honest:
#     RV=$(oc -n mssql-vss-lab get hook mssql-anchor-hook -o jsonpath='{.metadata.resourceVersion}')
#     oc -n mssql-vss-lab patch backupplan mssql-vss-backupplan --type=json \
#       -p "[{\"op\":\"replace\",\"path\":\"/spec/hookConfig/hooks/0/hook/resourceVersion\",\"value\":\"$RV\"}]"
#
# Runs in the virt-launcher `compute` container (backupplan.yaml hookConfig:
# podSelector on vm.kubevirt.io/name + containerRegex `^compute$`).
# Guest prereqs: QGA running; NT AUTHORITY\SYSTEM sysadmin on MSSQLSERVER01; D:\SQLBackup exists.
# Hook run logs (in-container, ephemeral): /var/tmp/tvk-prehook.log, /var/tmp/tvk-posthook.log
apiVersion: triliovault.trilio.io/v1
kind: Hook
metadata:
  name: mssql-anchor-hook
  namespace: mssql-vss-lab
spec:
  pre:
    maxRetryCount: 1
    timeoutSeconds: 300
    ignoreFailure: false
    execAction:
      command:
        - bash
        - -c
        - |
          set -u
          exec > >(tee -a /var/tmp/tvk-prehook.log) 2>&1
          echo "=== prehook run $(date -u +%Y-%m-%dT%H:%M:%SZ) pid $$"
          DOM=$(virsh list --name | head -n1)
          [ -n "$DOM" ] || { echo "prehook: no libvirt domain" >&2; exit 1; }

          # run_sql <label> <guest-exec JSON>: submit, poll to completion, print output
          run_sql() {
            local label=$1 req=$2 out pid st
            out=$(virsh qemu-agent-command "$DOM" "$req" 2>&1) || { echo "prehook: $label submit failed: $out" >&2; return 1; }
            pid=$(echo "$out" | grep -o '"pid":[0-9]*' | grep -o '[0-9]*')
            [ -n "$pid" ] || { echo "prehook: $label no pid in reply: $out" >&2; return 1; }
            echo "prehook: $label guest-exec pid=$pid"
            st=""
            for _ in $(seq 1 90); do
              st=$(virsh qemu-agent-command "$DOM" "{\"execute\":\"guest-exec-status\",\"arguments\":{\"pid\":$pid}}")
              echo "$st" | grep -q '"exited":true' && break
              sleep 2
            done
            echo "$st" | grep -q '"exited":true' || { echo "prehook: $label timed out" >&2; return 1; }
            echo "$st" | grep -o '"out-data":"[^"]*"' | cut -d'"' -f4 | base64 -d 2>/dev/null || true
            echo "$st" | grep -o '"err-data":"[^"]*"' | cut -d'"' -f4 | base64 -d 2>/dev/null || true
            echo "$st" | grep -q '"exitcode":0' || { echo "prehook: $label sqlcmd exited nonzero" >&2; return 1; }
          }

          ANCHOR=$(cat <<'EOF'
          {"execute":"guest-exec","arguments":{"path":"C:\\Program Files\\Microsoft SQL Server\\Client SDK\\ODBC\\180\\Tools\\Binn\\SQLCMD.EXE","arg":["-S",".\\MSSQLSERVER01","-E","-C","-b","-Q","BACKUP DATABASE demo_db TO DISK=N'D:\\SQLBackup\\tvk-prehook-anchor.bak' WITH COPY_ONLY, INIT, FORMAT"],"capture-output":true}}
          EOF
          )
          VERIFY=$(cat <<'EOF'
          {"execute":"guest-exec","arguments":{"path":"C:\\Program Files\\Microsoft SQL Server\\Client SDK\\ODBC\\180\\Tools\\Binn\\SQLCMD.EXE","arg":["-S",".\\MSSQLSERVER01","-E","-C","-b","-W","-s","|","-Q","RESTORE HEADERONLY FROM DISK=N'D:\\SQLBackup\\tvk-prehook-anchor.bak'"],"capture-output":true}}
          EOF
          )

          run_sql "anchor" "$ANCHOR" || exit 1
          run_sql "verify" "$VERIFY" || exit 1
          echo "prehook: COPY_ONLY anchor taken + verified OK"
  post:
    maxRetryCount: 1
    timeoutSeconds: 60
    ignoreFailure: false
    execAction:
      command:
        - bash
        - -c
        - |
          set -u
          exec > >(tee -a /var/tmp/tvk-posthook.log) 2>&1
          echo "=== posthook run $(date -u +%Y-%m-%dT%H:%M:%SZ) pid $$"
          DOM=$(virsh list --name | head -n1)
          [ -n "$DOM" ] || { echo "posthook: no libvirt domain" >&2; exit 1; }
          # Freeze-safe only: guest-exec is disabled until TVK thaws, and the thaw
          # waits for this hook — return fast so SQL's 60s VSS writer timeout
          # never trips. guest-ping / guest-fsfreeze-status are whitelisted.
          FS=$(virsh qemu-agent-command "$DOM" '{"execute":"guest-fsfreeze-status"}' 2>&1) && echo "posthook: fsfreeze-status: $FS" || echo "posthook: fsfreeze-status unavailable: $FS"
          virsh qemu-agent-command "$DOM" '{"execute":"guest-ping"}' >/dev/null || { echo "posthook: guest-ping failed" >&2; exit 1; }
          echo "posthook: QGA alive, ack OK"
