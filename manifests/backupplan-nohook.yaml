# Experiment 6 (docs/exp6-freeze-thaw-only.md): a plain, hook-free
# BackupPlan for the evidence SQL VM — deliberately NO hookConfig.
#
# Purpose: confirm (with fresh, live evidence) that a vanilla TVK VM backup
# already produces a working, app-consistent MSSQL restore via QEMU Guest
# Agent freeze/thaw alone (QGA fsfreeze -> Windows VSS -> SqlServerWriter),
# with no guest-exec/anchor mechanism involved. This is exactly how backup #1
# (2026-05-25, mssql-vss-backup-2phcr) worked before mssql-anchor-hook
# existed -- that backup was since pruned by retention, so this regenerates
# the evidence. Deliberately additive: does not touch or replace
# manifests/backupplan.yaml (mssql-vss-backupplan), which still carries the
# Sub-track 1 hook for the RPO/log-chain work.
apiVersion: triliovault.trilio.io/v1
kind: BackupPlan
metadata:
  name: mssql-vss-backupplan-nohook
  namespace: mssql-vss-lab
spec:
  backupConfig:
    target:
      apiVersion: triliovault.trilio.io/v1
      kind: Target
      name: sa-nfs-cr-demo
      namespace: trilio-system
    retentionPolicy:
      apiVersion: triliovault.trilio.io/v1
      kind: Policy
      name: trilio-latest-retention-policy
      namespace: trilio-system
  snapshotConfig:
    target:
      apiVersion: triliovault.trilio.io/v1
      kind: Target
      name: sa-nfs-cr-demo
      namespace: trilio-system
  # No hookConfig -- this is the point of the experiment.
  backupPlanComponents:
    customSelector:
      selectResources:
        gvkSelector:
          - groupVersionKind:
              group: kubevirt.io
              kind: VirtualMachine
              version: v1
            objects:
              - win2k22-aqua-junglefowl-90
