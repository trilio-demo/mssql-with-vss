# Experiment 5 BackupPlan: the VM *plus* its KubeVirt backend-storage PVC.
#
# The labelSelector is the experiment: `persistent-state-for: <vm-name>` is
# the label KubeVirt puts on the side PVC holding the persistent vTPM (swtpm)
# + EFI nvram state. It is not referenced in the VM spec's volumes, so the
# usual VM-only gvkSelector never captures it — and a restored VM gets a
# fresh, blank vTPM (fatal if BitLocker is sealed to it).
#
# Trigger-only (no schedule), no hooks — no SQL on this VM.
apiVersion: triliovault.trilio.io/v1
kind: BackupPlan
metadata:
  name: exp5-tpm-backupplan
  namespace: tpm-lab
spec:
  backupConfig:
    target:
      apiVersion: triliovault.trilio.io/v1
      kind: Target
      name: sa-nfs-cr-demo
      namespace: trilio-system
    retentionPolicy:
      apiVersion: triliovault.trilio.io/v1
      kind: Policy
      name: trilio-latest-retention-policy
      namespace: trilio-system
  snapshotConfig:
    target:
      apiVersion: triliovault.trilio.io/v1
      kind: Target
      name: sa-nfs-cr-demo
      namespace: trilio-system
  backupPlanComponents:
    customSelector:
      selectResources:
        gvkSelector:
          - groupVersionKind:
              group: kubevirt.io
              kind: VirtualMachine
              version: v1
            objects:
              - win2k25-tpm
        labelSelector:
          - matchLabels:
              persistent-state-for: win2k25-tpm
